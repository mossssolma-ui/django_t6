{% extends 'blog/base.html' %}
{% load static %}

{% block title %}Удаление поста{% endblock %}

{% block content %}
<main>
    <div class="container my-5">
        <div class="row">
            <div class="col-lg-6 mx-auto">
                <div class="card shadow border-danger">
                    <div class="card-body text-center py-4">
                        <h3 class="h5 mt-3">Вы уверены, что хотите удалить пост?</h3>
                        <form method="post">
                            {% csrf_token %}
                            <div class="d-flex justify-content-center gap-2">
                                <button type="submit" class="btn btn-danger">
                                    <i class="bi bi-trash me-2"></i>Да, удалить
                                </button>
                                <a href="{% url 'blog:post_details' object.pk %}" class="btn btn-outline-secondary">
                                    <i class="bi bi-arrow-left me-2"></i>Отмена
                                </a>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</main>
{% endblock %}
