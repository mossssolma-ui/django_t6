{% load static %}
<div class="col-md-6 col-lg-4">
    <div class="card h-100 shadow-sm hover-card">
        {% if post.image %}
        <img src="{{ post.image.url }}" class="card-img-top" alt="{{ post.title }}"
             style="height: 200px; object-fit: cover;">
        {% else %}
        <div class="bg-light d-flex align-items-center justify-content-center" style="height: 200px;">
            <i class="bi bi-image text-secondary" style="font-size: 3rem;"></i>
        </div>
        {% endif %}
        <div class="card-body">
            <div class="d-flex justify-content-between align-items-center mb-2">
                <span class="badge bg-primary">
                    <i class="bi bi-eye me-1"></i>{{ post.count_views }}
                </span>
                <small class="text-secondary">
                    <i class="bi bi-calendar3 me-1"></i>{{ post.created_at|date:"d.m.Y" }}
                </small>
            </div>
            <h5 class="card-title">{{ post.title }}</h5>
            <p class="card-text text-secondary">{{ post.content|truncatewords:50 }}</p>
        </div>
        <div class="card-footer bg-white border-0 pb-3">
            <a href="{% url 'blog:post_details' post.pk %}" class="btn btn-outline-primary w-100">
                Читать далее <i class="bi bi-arrow-right ms-1"></i>
            </a>
        </div>
    </div>
</div>
