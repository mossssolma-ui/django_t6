{% extends 'catalog/base.html' %}
{% load static %}
{% load my_tags %}

{% block title %}Удалить категорию{% endblock %}


{% block content %}
<div class="col-9 bg-light p-4">
    <header class="bg-light text-black text-center py-5">
        <div class="container">
            <h1 class="display-4">Удалить категорию</h1>
        </div>
    </header>

    <p>Вы уверены, что хотитель удалить "{{ category.name }}"?</p>
    <form method="post">
        {% csrf_token %}
        <button type="submit" class="btn btn-danger">Удалить</button>
        <a href="{% url 'catalog:category_list' %}" class="btn btn-secondary">Отмена</a>
    </form>
</div>
{% endblock %}
