{% extends 'catalog/base.html' %}
{% load static %}

{% block title %}{% if object %}Редактирование{% else %}Создание{% endif %} категории{% endblock %}


{% block content %}
<div class="col-9 bg-light p-4">
    <div class="container">
        <header class="bg-light text-black text-center py-5">
            <h1 class="display-4">Добавить новую категорию</h1>
        </header>

        <div class="row justify-content-center">
            <div class="col-8">
                <form method="post" enctype="multipart/form-data" class="border p-4 rounded">
                    {% csrf_token %}
                    {{ form.non_field_errors }}
                    {{ form.as_p }}
                    <div class="d-flex justify-content-between">
                        <button type="submit" class="btn btn-primary">
                            <i class="bi bi-check-lg me-2"></i>
                            {% if object %}Сохранить изменения{% else %}Создать новую категорию{% endif %}
                        </button>
                        <a href="{% url 'catalog:category_list' %}" class="btn btn-secondary">Отмена</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

{% endblock %}
