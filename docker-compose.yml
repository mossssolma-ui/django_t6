version: '3.9'

services:
  web:
    build: .
    command: >
      bash -c "python manage.py migrate && 
      python manage.py csu && 
      python manage.py collectstatic --noinput && 
      gunicorn config.wsgi:application --bind 0.0.0.0:8000"
    volumes:
      - .:/catalog
      - static_volume:/catalog/staticfiles
      - media_volume:/catalog/media
    expose:
      - "8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - .env

  nginx:
    build:
      context: ./nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
      - static_volume:/catalog/staticfiles
      - media_volume:/catalog/media
    depends_on:
      web:
        condition: service_started

  db:
    image: postgres:16.0
    volumes:
      - postgres_data:/var/lib/postgresql/data
    env_file:
      - .env
    expose:
      - "5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER}" ]
      interval: 30s
      timeout: 10s
      retries: 5

  redis:
    image: redis:alpine
    volumes:
      - redis_data:/data
    env_file:
      - .env
    expose:
      - "6379"
    healthcheck:
      test: [ "CMD-SHELL", "redis-cli ping" ]
      interval: 30s
      timeout: 10s
      retries: 5

volumes:
  postgres_data:
  redis_data:
  static_volume:
  media_volume: