{% extends 'catalog/base.html' %}
{% load static %}

{% block title %}Вход на сайт{% endblock %}

{% block content %}
<div class="col-9 bg-light p-4">
    <div class="container">
        <header class="bg-light text-black text-center py-5">
            <h1 class="display-4">Вход на сайт</h1>
            <p class="lead">Введите свои данные для входа</p>
        </header>

        <div class="row justify-content-center">
            <div class="col-8">
                <form method="post" class="border p-4 rounded">
                    {% csrf_token %}
                    {{ form.non_field_errors }}

                    <div class="mb-3">
                        <label for="{{ form.username.id_for_label }}" class="form-label">Email</label>
                        <input type="text"
                               name="{{ form.username.name }}"
                               id="{{ form.username.id_for_label }}"
                               class="form-control"
                               value="{{ form.username.value|default:'' }}">
                    </div>

                    <div class="mb-3">
                        <label for="{{ form.password.id_for_label }}" class="form-label">Пароль</label>
                        <input type="password"
                               name="{{ form.password.name }}"
                               id="{{ form.password.id_for_label }}"
                               class="form-control">
                    </div>

                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-primary flex-grow-1">
                            <i class="bi bi-box-arrow-in-right me-2"></i>
                            Войти
                        </button>
                        <a class="btn btn-success flex-grow-1" href="{% url 'users:register' %}">
                            <i class="bi bi-person-plus me-2"></i>
                            Зарегистрироваться
                        </a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
