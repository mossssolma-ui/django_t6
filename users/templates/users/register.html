{% extends 'catalog/base.html' %}
{% load static %}

{% block title %}Регистрация{% endblock %}

{% block content %}
<div class="col-9 bg-light p-4">
    <div class="container">
        <header class="bg-light text-black text-center py-5">
            <h1 class="display-4">Регистрация</h1>
            <p class="lead">Создайте новый аккаунт</p>
        </header>

        <div class="row justify-content-center">
            <div class="col-8">
                <form method="post" class="border p-4 rounded">
                    {% csrf_token %}
                    {{ form.non_field_errors }}

                    <div class="mb-3">
                        <label for="{{ form.email.id_for_label }}" class="form-label">Email</label>
                        <input type="email"
                               name="{{ form.email.name }}"
                               id="{{ form.email.id_for_label }}"
                               class="form-control"
                               value="{{ form.email.value|default:'' }}">
                    </div>

                    <div class="mb-3">
                        <label for="{{ form.password1.id_for_label }}" class="form-label">Пароль</label>
                        <input type="password"
                               name="{{ form.password1.name }}"
                               id="{{ form.password1.id_for_label }}"
                               class="form-control">
                        {% if form.password1.help_text %}
                            <small class="form-text text-muted">{{ form.password1.help_text }}</small>
                        {% endif %}
                    </div>

                    <div class="mb-3">
                        <label for="{{ form.password2.id_for_label }}" class="form-label">Подтверждение пароля</label>
                        <input type="password"
                               name="{{ form.password2.name }}"
                               id="{{ form.password2.id_for_label }}"
                               class="form-control">
                    </div>

                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-success flex-grow-1">
                            <i class="bi bi-person-plus me-2"></i>
                            Зарегистрироваться
                        </button>
                        <a class="btn btn-primary flex-grow-1" href="{% url 'users:login' %}">
                            <i class="bi bi-box-arrow-in-right me-2"></i>
                            Войти
                        </a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
